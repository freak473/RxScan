spring.application.name=backend
server.port=8080

# One Postgres server, two databases (engine plane has no user identity; consumer
# plane is the only place a userId/phone lives). See docs/rxscan-tech-design-v0_2_3.md §5.
app.datasource.engine.jdbc-url=jdbc:postgresql://localhost:5432/rxscan_engine
app.datasource.engine.username=${DB_USER:ankitjain}
app.datasource.engine.password=${DB_PASSWORD:}
app.datasource.engine.driver-class-name=org.postgresql.Driver
app.datasource.engine.pool-name=engine-pool

app.datasource.consumer.jdbc-url=jdbc:postgresql://localhost:5432/rxscan_consumer
app.datasource.consumer.username=${DB_USER:ankitjain}
app.datasource.consumer.password=${DB_PASSWORD:}
app.datasource.consumer.driver-class-name=org.postgresql.Driver
app.datasource.consumer.pool-name=consumer-pool

# Boot's single-datasource Flyway autoconfig can't target two DBs; we migrate each
# manually in DataSourceConfig. Disable the autoconfig so it doesn't fight us.
spring.flyway.enabled=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Vision extraction (com.rxscan.backend.extraction). No api-key default here on purpose: its
# absence is what keeps the VisionExtractionClient bean from being created (ExtractionConfig).
# Set rxscan.vision.api-key or the GEMINI_API_KEY env var to turn the feature on.
rxscan.vision.model=grok-4.5
rxscan.vision.base-url=https://api.x.ai/v1
# TODO(pending — see CLAUDE.md): paste the real xAI key below and uncomment to enable /extract.
# Kept commented on purpose: an empty/dummy value would create the vision bean and turn the
# honest 503 ("feature off") into a confusing upstream 401/502.
# rxscan.vision.api-key=xai-REPLACE-ME

# Selects which VisionExtractionClient bean is wired: gemini | grok | kimi | openai.
# grok/kimi/openai all use OpenAiCompatibleVisionExtractionClient (OpenAI chat/completions shape).
# xAI Grok needs the xAI key — set rxscan.vision.api-key=xai-... (else the hardcoded fallback in
# ExtractionConfig is sent as the Bearer token and xAI 401s).
rxscan.vision.provider=grok
# Gemini: provider=gemini · base-url=https://generativelanguage.googleapis.com/v1beta · model=gemini-2.0-flash
# Kimi:   provider=kimi   · base-url=https://api.moonshot.ai/v1 · model=moonshot-v1-8k-vision-preview · api-key=sk-...

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Dev aid: log every dispatched request (method + URI) to the console so incoming
# /extract hits are visible even when they resolve to a handled 4xx/5xx. Drop or
# move behind a dev profile before production.
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# Consumer-plane crypto + auth. Dev defaults below are NOT for production —
# override via env. Keys are derived as SHA-256(secret string) in CryptoService.
rxscan.crypto.master-key=${RXSCAN_MASTER_KEY:dev-master-key-not-for-prod}
rxscan.crypto.blind-idx-key=${RXSCAN_BLIND_IDX_KEY:dev-blind-idx-key-not-for-prod}
rxscan.auth.jwt-secret=${RXSCAN_JWT_SECRET:dev-jwt-secret-not-for-prod}
rxscan.auth.token-ttl-days=30
rxscan.auth.dev-otp=000000
# OTP delivery strategy: stub (accepts rxscan.auth.dev-otp, sends nothing) | gupshup.
rxscan.otp.provider=stub
# Gupshup (dormant until DLT contract closes — see CHECKLIST):
# rxscan.otp.gupshup.user-id= / password= / principal-entity-id= / template-id=
# rxscan.otp.gupshup.template=Your RxScan OTP is %s
