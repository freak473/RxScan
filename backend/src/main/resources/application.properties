spring.application.name=backend
server.port=8080

# One Postgres server, two databases (engine plane has no user identity; consumer
# plane is the only place a userId/phone lives). See docs/rxscan-tech-design-v0_2_2.md §5.
app.datasource.engine.jdbc-url=jdbc:postgresql://localhost:5432/rxscan_engine
app.datasource.engine.username=${DB_USER:ankitjain}
app.datasource.engine.password=${DB_PASSWORD:}
app.datasource.engine.driver-class-name=org.postgresql.Driver
app.datasource.engine.pool-name=engine-pool

app.datasource.consumer.jdbc-url=jdbc:postgresql://localhost:5432/rxscan_consumer
app.datasource.consumer.username=${DB_USER:ankitjain}
app.datasource.consumer.password=${DB_PASSWORD:}
app.datasource.consumer.driver-class-name=org.postgresql.Driver
app.datasource.consumer.pool-name=consumer-pool

# Boot's single-datasource Flyway autoconfig can't target two DBs; we migrate each
# manually in DataSourceConfig. Disable the autoconfig so it doesn't fight us.
spring.flyway.enabled=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Vision extraction (com.rxscan.backend.extraction). No api-key default here on purpose: its
# absence is what keeps the VisionExtractionClient bean from being created (ExtractionConfig).
# Set rxscan.vision.api-key or the GEMINI_API_KEY env var to turn the feature on.
rxscan.vision.model=gemini-2.0-flash
rxscan.vision.base-url=https://generativelanguage.googleapis.com/v1beta

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
